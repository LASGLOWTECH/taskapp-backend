name: CD - Deploy Backend to Kubernetes

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'migrations/**'
      - 'requirements.txt'
      - 'alembic.ini'
      - 'run.py'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: taskapp-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ secrets.GHCR_USERNAME }}/taskapp-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Configure kubectl
        run: mkdir -p ~/.kube && echo ${{ secrets.KUBE_CONFIG }} | base64 -d > ~/.kube/config && chmod 600 ~/.kube/config

      - name: Update deployment image
        run: kubectl set image deployment/taskapp-backend taskapp-backend=ghcr.io/${{ secrets.GHCR_USERNAME }}/taskapp-backend:latest -n taskapp --insecure-skip-tls-verify

      - name: Force rollout restart
        run: kubectl rollout restart deployment/taskapp-backend -n taskapp --insecure-skip-tls-verify

      - name: Wait for rollout
        run: kubectl rollout status deployment/taskapp-backend -n taskapp --timeout=5m --insecure-skip-tls-verify

      - name: Run database migrations
        run: |
          kubectl exec deploy/taskapp-backend -n taskapp -- alembic upgrade head --insecure-skip-tls-verify
name: CD - Deploy Backend to Kubernetes

on:
  workflow_run:
    workflows: [Backend CI]
    branches: [main]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: taskapp-backend

jobs:
  deploy:
    name: Build and Deploy to Kubernetes
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == success

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          run-id: PLACEHOLDER1
          github-token: PLACEHOLDER2

      - name: Extract artifact
        run: tar -xzf backend.tar.gz && rm backend.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: PLACEHOLDER3
          password: PLACEHOLDER4

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/PLACEHOLDER5/taskapp-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Configure kubectl
        run: mkdir -p ~/.kube && echo PLACEHOLDER6 | base64 -d > ~/.kube/config && chmod 600 ~/.kube/config

      - name: Update Kubernetes deployment
        run: kubectl set image deployment/taskapp-backend taskapp-backend=ghcr.io/PLACEHOLDER5/taskapp-backend:latest -n taskapp

      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/taskapp-backend -n taskapp --timeout=5m

      - name: Verify deployment
        run: kubectl get pods -n taskapp -l app=taskapp-backend
